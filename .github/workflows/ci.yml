name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
      - run: uv sync
      - run: uv run pytest tests/

  readme:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
      - run: uv sync
      # Tables are regenerated from the committed CSV; no S3 or external
      # data access needed. DVX .dvc files track provenance only.
      - run: uv run mdcmd -i README.md
      - name: Check README is up to date
        run: |
          if ! git diff --exit-code README.md; then
            echo "::error::README.md is stale. Run 'uv run mdcmd -i README.md' locally and commit."
            exit 1
          fi

  dvx-status:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
      - run: uv sync
      - name: Check DVX-tracked artifacts are fresh
        run: |
          if ! uv run dvx status 2>&1 | tee /tmp/dvx-status.log; then
            echo "::error::dvx status failed"
            exit 1
          fi
          if grep -q "Stale:" /tmp/dvx-status.log && ! grep -q "Stale: 0" /tmp/dvx-status.log; then
            echo "::error::DVX-tracked artifacts are stale vs their .dvc provenance. Re-run the producing command and commit."
            exit 1
          fi
