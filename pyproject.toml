# url = "https://marin-community.github.io/chatnoir-resiliparse/simple"
#
# [tool.uv.sources]
# resiliparse = { index = "marin-resiliparse" }

[tool.hatch.metadata]
allow-direct-references = true

[tool.hatch.build.targets.wheel]
packages = ["src/tomat"]

[tool.pytest.ini_options]
testpaths = ["tests"]
